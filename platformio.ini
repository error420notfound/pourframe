[platformio]
default_envs = shrike-fi
src_dir = src
data_dir = data

[env:esp32-base]
# Shrike-Fi uses an ESP32-S3 with 8 MB QSPI flash and no confirmed PSRAM.
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
build_type = release

monitor_speed = 115200
upload_protocol = esptool
upload_speed = 460800

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_qspi
board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv

build_flags =
    -D POURFRAME_PROTOCOL_VERSION=1

# Hardware-only smoke test: dual HX711 readings plus an RGB status LED rainbow; no Wi-Fi, filesystem, or web server.
[env:hx711-validation]
extends = env:esp32-base
build_src_filter =
    -<*>
    +<hardware_validation.cpp>
lib_deps =
    bogde/HX711@0.7.5
    fastled/FastLED@3.10.3

# Full-rate CSV capture. Set the four calibration values below from a manual
# tare/known-weight session and change CALIBRATED to 1 for gram-domain output.
[env:hx711-diagnostics]
extends = env:esp32-base
monitor_speed = 921600
build_src_filter =
    -<*>
    +<measurement_diagnostics.cpp>
build_flags =
    -D POURFRAME_DIAG_UPPER_ZERO=0.0
    -D POURFRAME_DIAG_UPPER_FACTOR=1.0
    -D POURFRAME_DIAG_LOWER_ZERO=0.0
    -D POURFRAME_DIAG_LOWER_FACTOR=1.0
    -D POURFRAME_DIAG_CALIBRATED=0
lib_deps =
    bogde/HX711@0.7.5

# Complete dual-scale controller and LittleFS web application.
[env:shrike-fi]
extends = env:esp32-base
lib_ignore =
    ESPAsyncTCP
    RPAsyncTCP
build_src_filter =
    +<*>
    -<hardware_validation.cpp>
    -<measurement_diagnostics.cpp>
lib_deps =
    bogde/HX711@0.7.5
    fastled/FastLED@3.10.3
    esp32async/ESPAsyncWebServer@3.11.2
    esp32async/AsyncTCP@3.4.10
    bblanchon/ArduinoJson@7.4.3

# Hardware-independent measurement tests. The same pipeline source is linked
# into firmware, replay, and this native executable.
[env:native]
platform = native
build_flags =
    -std=c++17
    -I lib/measurement
