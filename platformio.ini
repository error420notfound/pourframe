[platformio]
default_envs = shrike-fi
src_dir = src
data_dir = data

[env]
# Shrike-Fi uses an ESP32-S3 with 8 MB QSPI flash and no confirmed PSRAM.
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
build_type = release

monitor_speed = 115200
upload_protocol = esptool
upload_speed = 460800

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_qspi
board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv

build_flags =
    -D POURFRAME_PROTOCOL_VERSION=1

# Hardware-only smoke test: no Wi-Fi, filesystem, web server, or LEDs.
[env:hx711-validation]
build_src_filter =
    -<*>
    +<hardware_validation.cpp>
lib_deps =
    bogde/HX711@0.7.5

# Complete dual-scale controller and LittleFS web application.
[env:shrike-fi]
build_src_filter =
    +<*>
    -<hardware_validation.cpp>
lib_deps =
    bogde/HX711@0.7.5
    esp32async/ESPAsyncWebServer@3.11.2
    esp32async/AsyncTCP@3.4.10
    bblanchon/ArduinoJson@7.4.3
